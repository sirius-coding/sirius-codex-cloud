version: "3.9"

services:
  freelance-api:
    build:
      context: ./apps/freelance-api
    container_name: freelance-template-api
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./apps/freelance-api/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-crawler:
    build:
      context: ./apps/web-crawler
    container_name: freelance-template-crawler
    env_file:
      - .env
    environment:
      CRAWLER_URL: ${CRAWLER_URL:-https://example.com}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-10}
      CRAWLER_INTERVAL_SECONDS: ${CRAWLER_INTERVAL_SECONDS:-0}
    command:
      [
        "python",
        "main.py",
        "--url",
        "${CRAWLER_URL:-https://example.com}",
        "--max-pages",
        "${CRAWLER_MAX_PAGES:-10}",
        "--interval-seconds",
        "${CRAWLER_INTERVAL_SECONDS:-0}"
      ]
    restart: unless-stopped
    profiles:
      - crawler

  booking-api:
    build:
      context: ./apps/booking-api
    container_name: freelance-template-booking-api
    ports:
      - "8010:8010"
    volumes:
      - ./apps/booking-api/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - booking

  expense-tracker:
    build:
      context: ./apps/expense-tracker
    container_name: freelance-template-expense-tracker
    volumes:
      - ./apps/expense-tracker/data:/app/data
    command: ["python", "main.py", "--help"]
    profiles:
      - expense

  file-backup-worker:
    build:
      context: ./apps/file-backup-worker
    container_name: freelance-template-file-backup-worker
    volumes:
      - ./apps/file-backup-worker/data:/app/data
    command: ["python", "main.py", "--help"]
    profiles:
      - backup

  crm-api:
    build:
      context: ./apps/crm-api
    container_name: freelance-template-crm-api
    ports:
      - "8021:8021"
    volumes:
      - ./apps/crm-api/data:/app/data
    restart: unless-stopped
    profiles:
      - crm

  invoice-service:
    build:
      context: ./apps/invoice-service
    container_name: freelance-template-invoice-service
    ports:
      - "8022:8022"
    volumes:
      - ./apps/invoice-service/data:/app/data
    restart: unless-stopped
    profiles:
      - invoice

  helpdesk-api:
    build:
      context: ./apps/helpdesk-api
    container_name: freelance-template-helpdesk-api
    ports:
      - "8023:8023"
    volumes:
      - ./apps/helpdesk-api/data:/app/data
    restart: unless-stopped
    profiles:
      - helpdesk

  inventory-api:
    build:
      context: ./apps/inventory-api
    container_name: freelance-template-inventory-api
    ports:
      - "8024:8024"
    volumes:
      - ./apps/inventory-api/data:/app/data
    restart: unless-stopped
    profiles:
      - inventory

  subscription-billing-api:
    build:
      context: ./apps/subscription-billing-api
    container_name: freelance-template-subscription-billing-api
    ports:
      - "8025:8025"
    volumes:
      - ./apps/subscription-billing-api/data:/app/data
    restart: unless-stopped
    profiles:
      - billing

  notification-hub:
    build:
      context: ./apps/notification-hub
    container_name: freelance-template-notification-hub
    ports:
      - "8026:8026"
    volumes:
      - ./apps/notification-hub/data:/app/data
    restart: unless-stopped
    profiles:
      - notification

  contract-lifecycle-api:
    build:
      context: ./apps/contract-lifecycle-api
    container_name: freelance-template-contract-lifecycle-api
    ports:
      - "8027:8027"
    volumes:
      - ./apps/contract-lifecycle-api/data:/app/data
    restart: unless-stopped
    profiles:
      - contract

  timesheet-api:
    build:
      context: ./apps/timesheet-api
    container_name: freelance-template-timesheet-api
    ports:
      - "8028:8028"
    volumes:
      - ./apps/timesheet-api/data:/app/data
    restart: unless-stopped
    profiles:
      - timesheet

  lead-scoring-api:
    build:
      context: ./apps/lead-scoring-api
    container_name: freelance-template-lead-scoring-api
    ports:
      - "8029:8029"
    volumes:
      - ./apps/lead-scoring-api/data:/app/data
    restart: unless-stopped
    profiles:
      - lead

  knowledge-base-api:
    build:
      context: ./apps/knowledge-base-api
    container_name: freelance-template-knowledge-base-api
    ports:
      - "8030:8030"
    volumes:
      - ./apps/knowledge-base-api/data:/app/data
    restart: unless-stopped
    profiles:
      - knowledge

  docs:
    image: squidfunk/mkdocs-material:9
    container_name: freelance-template-docs
    ports:
      - "9000:8000"
    volumes:
      - ./:/docs
    command: serve -a 0.0.0.0:8000
    profiles:
      - docs
